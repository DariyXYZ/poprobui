<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Попробуй — Профориентация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #F5F5FB;
    --surface2: #EBEBF7;
    --accent: #5B54EE;
    --accent-light: #EDEEFF;
    --accent-dim: rgba(91,84,238,.12);
    --text: #0E0E1C;
    --text2: #4A4A68;
    --muted: #8E8EA8;
    --border: #E6E6F2;
    --green: #16A34A;
    --radius: 14px;
    --radius-sm: 10px;
    --font-head: 'Outfit', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E0E18;
      --surface: #18182A;
      --surface2: #20203A;
      --text: #EDEDFA;
      --text2: #9090B8;
      --muted: #5A5A78;
      --border: #26263A;
      --accent-light: #1E1C42;
      --accent-dim: rgba(91,84,238,.18);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Screens ── */
  .screen {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
    padding: 24px 20px 140px;
  }
  .screen.active { display: flex; }

  /* ── Shared: uppercase caption label ── */
  .intro-eyebrow, .section-label, .pair-label, .type-hero-profs-label {
    font-family: var(--font-head);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.3px;
    text-transform: uppercase;
  }

  /* ── Intro ── */
  .intro-eyebrow {
    color: var(--accent);
    text-align: center;
    margin-top: 32px;
    margin-bottom: 12px;
  }
  .intro-title {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.8px;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .intro-title span { color: var(--accent); }
  .intro-sub {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    line-height: 1.65;
    margin-bottom: 32px;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
  }

  .test-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .test-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color .15s ease, background .15s ease;
    touch-action: manipulation;
  }
  .test-card:active { opacity: .85; }
  .test-card.selected { border-color: var(--accent); background: var(--accent); }

  /* ── Progress ── */
  .progress-wrap { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .35s cubic-bezier(.4,0,.2,1);
  }

  /* ── Question ── */
  .pair-label {
    color: var(--muted);
    margin-bottom: 10px;
  }
  .pair-vs {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin: 8px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .q-text {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 20px;
    color: var(--text);
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    line-height: 1.45;
    transition: border-color .15s ease, background .15s ease;
    touch-action: manipulation;
    width: 100%;
  }
  .opt-btn:active { opacity: .8; }
  .opt-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Results ── */
  .results-header { text-align: center; margin-bottom: 28px; padding-top: 8px; }
  .results-emoji { font-size: 48px; margin-bottom: 12px; line-height: 1; }
  .results-title {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .results-sub { font-size: 13px; color: var(--text2); }

  .top-cards { display: flex; gap: 8px; margin-bottom: 24px; }
  .top-card {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 8px;
    text-align: center;
    border: 1.5px solid var(--border);
  }
  .top-card.first {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .top-card .rank {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    opacity: .65;
    margin-bottom: 5px;
  }
  .top-card .type-name {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
  }

  .section-label {
    color: var(--muted);
    margin-bottom: 14px;
    margin-top: 4px;
  }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-name {
    width: 110px;
    font-size: 13px;
    font-weight: 400;
    flex-shrink: 0;
    text-align: right;
    color: var(--text2);
  }
  .bar-name.hl { font-weight: 600; color: var(--accent); }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--surface2);
    border-radius: 99px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .bar-fill.hl { background: var(--accent); }

  /* ── Tier pricing cards ── */
  .test-card {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px;
  }
  .tier-icon-badge {
    width: 52px;
    height: 52px;
    border-radius: var(--radius);
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    transition: background .15s ease;
  }
  .test-card.selected .tier-icon-badge { background: rgba(255,255,255,.22); }
  .tier-body { flex: 1; min-width: 0; padding-right: 26px; }
  .tier-head-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 3px;
  }
  .tier-name {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -.2px;
  }
  .test-card.selected .tier-name { color: #fff; }
  .tier-price-tag {
    font-family: var(--font-head);
    font-size: 12.5px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 99px;
    flex-shrink: 0;
    letter-spacing: -.2px;
  }
  .test-card.selected .tier-price-tag { background: rgba(255,255,255,.26); color: #fff; }
  .tier-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .test-card.selected .tier-meta { color: rgba(255,255,255,.78); }
  .tier-feats { display: flex; flex-direction: column; gap: 4px; }
  .tier-feat {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
  }
  .tier-feat::before {
    content: "✓";
    color: var(--green);
    font-size: 10px;
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .test-card.selected .tier-feat { color: rgba(255,255,255,.92); }
  .test-card.selected .tier-feat::before { color: #fff; }
  .tier-radio {
    position: absolute;
    top: 16px; right: 16px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: transparent;
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .test-card.selected .tier-radio { background: #fff; border-color: #fff; color: var(--accent); }

  /* ── Results: type hero ── */
  .type-hero {
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px 18px;
    margin-bottom: 20px;
  }
  .type-hero-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .type-hero-icon {
    font-size: 32px;
    line-height: 1;
    flex-shrink: 0;
    width: 60px; height: 60px;
    border-radius: var(--radius);
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
  }
  .type-hero-name {
    font-family: var(--font-head);
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -.3px;
    margin-bottom: 3px;
  }
  .type-hero-desc { font-size: 12.5px; color: rgba(255,255,255,.82); line-height: 1.45; }
  .type-hero-salary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.18);
    padding: 6px 12px;
    border-radius: 99px;
    font-size: 12.5px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .type-hero-profs-label {
    color: rgba(255,255,255,.65);
    margin-bottom: 8px;
  }
  .type-hero-profs { display: flex; flex-wrap: wrap; gap: 6px; }
  .type-hero-tag {
    background: rgba(255,255,255,.16);
    color: #fff;
    font-size: 12.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 99px;
  }

  /* ── Results: upgrade teaser ── */
  .tier-upgrade-box {
    background: var(--accent-light);
    border: 1.5px dashed var(--accent);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    text-align: center;
  }
  .tier-upgrade-box-text { font-size: 12.5px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }
  .tier-upgrade-box-btn {
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 99px;
    padding: 8px 18px;
    font-family: var(--font-head);
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    transition: background .12s, color .12s;
  }
  .tier-upgrade-box-btn:active { background: rgba(91,84,238,.2); }

  /* ── Graph screen ── */
  .graph-screen { padding: 0; position: relative; overflow: hidden; }
  #tree-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  #tree-canvas.dragging { cursor: grabbing; }
  .graph-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 22px 20px 0;
    text-align: center;
    pointer-events: none;
    z-index: 2;
  }
  .graph-title { font-size: 21px; margin-bottom: 0; }
  .graph-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 5px 12px;
    border-radius: 99px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text2);
  }
  .icon-btn-mini {
    position: absolute;
    top: 22px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    z-index: 3;
  }
  .icon-btn-mini:active { opacity: .7; }
  .graph-tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    transform: translate(-50%, -140%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .1s ease;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }

  /* ── Bottom sheet ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: flex-end;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
  }
  .sheet-overlay.active { opacity: 1; pointer-events: auto; }
  .sheet {
    background: var(--bg);
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 10px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.32,.72,0,1);
    max-height: 82vh;
    overflow-y: auto;
  }
  .sheet-overlay.active .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 6px auto 16px;
  }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: none;
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: opacity .15s ease, transform .12s ease;
    touch-action: manipulation;
    letter-spacing: -.1px;
  }
  .btn:active { opacity: .82; transform: scale(.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text2);
    border: 1.5px solid var(--border);
    font-weight: 600;
  }
  .btn-ghost {
    background: none;
    color: var(--muted);
    font-size: 14px;
    padding: 12px;
    font-weight: 500;
  }

  .btn-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: none;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }
  .screen.active .btn-footer { display: flex; }

  /* ── History ── */
  .history-empty { text-align: center; color: var(--muted); font-size: 15px; padding: 56px 0; }
  .hist-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    border: 1.5px solid var(--border);
  }
  .hist-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .hist-test-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; }
  .hist-date { font-size: 11px; color: var(--muted); font-weight: 500; }
  .hist-tops { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .hist-top-tag {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
  }
  .hist-top-tag.first { background: var(--accent); color: #fff; }
  .hist-actions { display: flex; gap: 8px; }
  .hist-btn {
    flex: 1;
    padding: 9px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }
  .hist-btn-view { background: var(--surface2); color: var(--text2); }
  .hist-btn-pdf { background: var(--accent); color: #fff; }

  /* ── Loading ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Screen: Intro (граф-пространство) ──────────────────────────────── -->
<div id="screen-intro" class="screen graph-screen active">
  <canvas id="tree-canvas"></canvas>
  <div class="graph-tooltip" id="graph-tooltip"></div>
  <div class="graph-header">
    <div class="intro-eyebrow">Попробуй</div>
    <div class="intro-title graph-title">Твоя карта интересов</div>
    <div class="graph-status" id="graph-status">Начни с бесплатного теста</div>
  </div>
  <button class="icon-btn-mini" id="btn-randomize" onclick="randomizeLook()" title="Другой вариант карты">⟳</button>

  <div class="btn-footer">
    <button class="btn btn-primary" id="graph-cta" onclick="onGraphCta()">Начать бесплатно →</button>
  </div>
</div>

<!-- ── Bottom sheet (превью теста / результат) ────────────────────────── -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet-body" onclick="event.stopPropagation()"></div>
</div>

<!-- ── Screen: Test ────────────────────────────────────────────────────── -->
<div id="screen-test" class="screen">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="q-counter">Вопрос 1 из 20</span>
      <span id="q-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="q-body"></div>
  <div class="btn-footer">
    <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" disabled>Далее →</button>
    <button class="btn btn-ghost" onclick="prevQuestion()">← Назад</button>
  </div>
</div>

<!-- ── Screen: Loading ─────────────────────────────────────────────────── -->
<div id="screen-loading" class="screen">
  <div class="loader">
    <div class="spinner"></div>
    <span style="color:var(--muted);font-size:15px">Считаем результат…</span>
  </div>
</div>

<!-- ── Screen: Results ─────────────────────────────────────────────────── -->
<div id="screen-results" class="screen">
  <div class="results-header">
    <div class="results-emoji">🎯</div>
    <div class="results-title">Твой профиль готов!</div>
    <div class="results-sub" id="results-sub">Вот что мы узнали о тебе</div>
  </div>

  <div class="top-cards" id="top-cards"></div>

  <div class="type-hero" id="type-hero"></div>

  <div class="section-label">Все шкалы</div>
  <div id="bars-wrap"></div>

  <div id="upgrade-block"></div>

  <div class="btn-footer">
    <button class="btn btn-primary" id="btn-pdf" onclick="downloadPDF()">📨 Получить PDF в Telegram</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-intro'); renderGraphScreen();">← Смотреть карту</button>
  </div>
</div>

<!-- ── Screen: History ────────────────────────────────────────────────── -->
<div id="screen-history" class="screen">
  <div style="font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px">Мои результаты</div>
  <div style="color:var(--muted);font-size:13px;font-weight:500;margin-bottom:24px">История тестирований</div>
  <div id="history-list"></div>
  <div class="btn-footer">
    <button class="btn btn-secondary" onclick="showScreen('screen-intro')">← К тестам</button>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const API_URL = "https://b367ca9ad96ac3.lhr.life";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const TG_USER_ID = tg?.initDataUnsafe?.user?.id || 0;

// ── State ────────────────────────────────────────────────────────────────
let selectedTest = "ddo";
let questions = [];
let answers = {};
let currentQ = 0;
let resultId = null;
let resultScores = null;
let resultTopTypes = [];
let resultRecommendations = [];
let resultTestId = "ddo";

// ── Test definitions ─────────────────────────────────────────────────────
const TESTS = {
  ddo: {

function loadTree() {
  try { return JSON.parse(localStorage.getItem("poprobui_tree") || "{}"); } catch (e) { return {}; }
}
function saveTreeResult(testId, scores, topTypes) {
  const tree = loadTree();
  tree[testId] = { scores, top_types: topTypes };
  localStorage.setItem("poprobui_tree", JSON.stringify(tree));
}
function completedTests() {
  const tree = loadTree();
  return TEST_SEQUENCE.filter(id => tree[id]);
}
function nextTestId() {
  const done = completedTests();
  return TEST_SEQUENCE.find(id => !done.includes(id)) || null;
}

function startTest() {
  const testDef = TESTS[selectedTest];
  questions = testDef.questions;
  answers = {};
  currentQ = 0;
  renderQuestion();
  showScreen("screen-test");
}

// ── Question rendering ───────────────────────────────────────────────────
function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round(currentQ / total * 100);

  document.getElementById("q-counter").textContent = `Вопрос ${currentQ + 1} из ${total}`;
  document.getElementById("q-pct").textContent = `${pct}%`;
  document.getElementById("progress-fill").style.width = `${pct}%`;
  document.getElementById("btn-next").disabled = !answers[q.id];

  const body = document.getElementById("q-body");

  if (q.type === "pair") {
    body.innerHTML = `
      <div class="pair-label">Что тебе больше нравится?</div>
      <button class="opt-btn ${answers[q.id]==='a'?'selected':''}" onclick="selectAnswer('a')">
        ${q.a}
      </button>
      <div class="pair-vs">или</div>
      <button class="opt-btn ${answers[q.id]==='b'?'selected':''}" onclick="selectAnswer('b')">
        ${q.b}
      </button>
    `;
  } else if (q.type === "choice3") {
    body.innerHTML = `
      <div class="q-text">${q.text}</div>
      <div class="options">
        <button class="opt-btn ${answers[q.id]==='a'?'selected':''}" onclick="selectAnswer('a')">А. ${q.a}</button>
        <button class="opt-btn ${answers[q.id]==='b'?'selected':''}" onclick="selectAnswer('b')">Б. ${q.b}</button>
        <button class="opt-btn ${answers[q.id]==='c'?'selected':''}" onclick="selectAnswer('c')">В. ${q.c}</button>
      </div>
    `;
  } else if (q.type === "scale5") {
    const labels = ["Совсем нет","Не очень","Нейтрально","Нравится","Очень нравится"];
    body.innerHTML = `
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${[1,2,3,4,5].map(v => `
          <button class="opt-btn ${answers[q.id]==v?'selected':''}" onclick="selectAnswer(${v})">
            ${v}. ${labels[v-1]}
          </button>
        `).join("")}
      </div>
    `;
  }
}

function selectAnswer(val) {
  answers[questions[currentQ].id] = val;
  document.getElementById("btn-next").disabled = false;
  renderQuestion();
}

function nextQuestion() {
  if (!answers[questions[currentQ].id]) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    submitAnswers();
  }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
  else showScreen("screen-intro");
}

// update next button label on last question
document.getElementById("btn-next").addEventListener("click", () => {});

// ── Submit & Results ─────────────────────────────────────────────────────
async function submitAnswers() {
  showScreen("screen-loading");
  resultTestId = selectedTest;
  // last question label
  document.getElementById("btn-next").textContent = "Далее →";

  try {
    const res = await fetch(`${API_URL}/submit`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        tg_user_id: TG_USER_ID,
        test_id: selectedTest,
        answers: answers,
      })
    });
    const data = await res.json();
    resultId = data.result_id;
    handleTestComplete(data);
  } catch(e) {
    // offline fallback — local scoring
    const scores = localScore();
    const topTypes = Object.keys(scores).sort((a,b)=>scores[b]-scores[a]).slice(0,3);
    handleTestComplete({ scores, top_types: topTypes, recommendations: [] });
  }
}

// Called once a test is scored (server or offline). Persists into history +
// the tree, then returns to the graph screen and grows the new branch in
// with the staged reveal animation before showing the result sheet.
function handleTestComplete(data) {
  resultScores = data.scores;
  resultTopTypes = data.top_types;
  resultRecommendations = data.recommendations || [];
  saveToHistory(selectedTest, data.scores, data.top_types, data.recommendations);

  showScreen("screen-intro");
  rebuildTreeInstant(); // silently place what was already there — no replay
  saveTreeResult(selectedTest, data.scores, data.top_types);
  const root = treeNodeById.get(ROOT_ID);
  if (root) { root.r = rootRadius(completedTests().length); root.bornAt = performance.now(); } // pulse
  updateGraphStatus();
  growNewBranch(selectedTest, { scores: data.scores, top_types: data.top_types }, TEST_SEQUENCE.indexOf(selectedTest));
  setTimeout(() => openResultSheet(selectedTest, data), 900);
}

    };
    const s = {};
    for (const [scale, pairs] of Object.entries(KEY)) {
      s[scale] = pairs.filter(([q,v]) => answers[q] === v).length;
    }
    return s;
  }
  if (selectedTest === "yovayshi") {
    const scores = {};
    for (const [q, scaleMap] of Object.entries(YOVAYSHI_KEY)) {
      const ans = answers[q];
      if (ans && scaleMap[ans]) scores[scaleMap[ans]] = (scores[scaleMap[ans]] || 0) + 1;
    }
    for (const s of ["Люди","Исследование","Производство","Эстетика","Экстремал","Планово-экон."]) {
      if (!(s in scores)) scores[s] = 0;
    }
    return scores;
  }
  if (selectedTest === "onett") {
    const RANGES = {
      "R — Реалист": [1,10], "I — Исследователь": [11,20], "A — Художник": [21,30],
      "S — Социальный": [31,40], "E — Предприниматель": [41,50], "C — Конвенциональный": [51,60],
    };
    const scores = {};
    for (const [label, [start, end]] of Object.entries(RANGES)) {
      let sum = 0;
      for (let i = start; i <= end; i++) sum += Number(answers[`q${i}`] || 3);
      scores[label] = sum;
    }
    return scores;
  }
  return {};
}

// ── Neurocard: single-tree force-directed graph (canvas, no dependencies) ──
// One root ("Ты") with a branch per completed test; hubs are that test's
// scale scores, leaves are matched professions for the top-scoring hub.
// Attraction along edges (spring) + repulsion between all nodes (Coulomb-like)
// + gentle centering, integrated every frame — same shape as Obsidian's graph.
const ROOT_ID = "__root__";
const BRANCH_HUES = [172, 322, 42]; // teal / magenta / amber, one per test slot
const POP_MS = 320; // per-node pop-in duration
const CAM_PAD_TOP = 118, CAM_PAD_BOTTOM = 104, CAM_PAD_SIDE = 20;

let treeNodes = [], treeEdges = [], treeNodeById = new Map();
let treePhysics = randomTreePhysics();
let hueJitter = Math.random() * 30 - 15;
let canvasEl, ctxEl, canvasW = 0, canvasH = 0;
let dragNode = null, downNode = null, moveDist = 0, hoveredNode = null;
let hasShownTreeOnce = false;
let camScale = 1, camCX = 0, camCY = 0;

function rootRadius(doneCount) { return 9 + doneCount * 4; }

function randomTreePhysics() {
  return {
    repel: 2200 + Math.random() * 1400,
    spring: 0.010 + Math.random() * 0.010,
    restTrunk: 55 + Math.random() * 25,
    restHub: 42 + Math.random() * 22,
    restSat: 20 + Math.random() * 12,
    damping: 0.85 + Math.random() * 0.03,
  };
}

function initTreeCanvas() {
  canvasEl = document.getElementById("tree-canvas");
  if (!canvasEl) return;
  ctxEl = canvasEl.getContext("2d");
  resizeTreeCanvas();
  window.addEventListener("resize", resizeTreeCanvas);
  wireTreeInteraction();
}
function resizeTreeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvasW = canvasEl.parentElement.clientWidth;
  canvasH = canvasEl.parentElement.clientHeight;
  canvasEl.width = canvasW * dpr; canvasEl.height = canvasH * dpr;
  canvasEl.style.width = canvasW + "px"; canvasEl.style.height = canvasH + "px";
  ctxEl.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (!treeNodes.length) { camCX = canvasW / 2; camCY = canvasH / 2; camScale = 1.1; }
}

function addTreeNode(n) { treeNodes.push(n); treeNodeById.set(n.id, n); }
function spawnNear(parent, jitter, angle) {
  const a = angle != null ? angle : Math.random() * Math.PI * 2;
  const d = angle != null ? 55 : 6 + Math.random() * jitter;
  return {
    x: (parent ? parent.x : canvasW / 2) + Math.cos(a) * d,
    y: (parent ? parent.y : canvasH / 2) + Math.sin(a) * d,
  };
}

// ── Build order: one flat list of "add this node" steps, root first, then
// each completed test's branch in sequence — played back one at a time so
// the tree visibly grows instead of appearing all at once.
function buildTreeSchedule() {
  const schedule = [];
  const tree = loadTree();
  const doneCount = TEST_SEQUENCE.filter(id => tree[id]).length;

  schedule.push(() => {
    const name = tg?.initDataUnsafe?.user?.first_name || "Ты";
    addTreeNode({ id: ROOT_ID, label: name, x: canvasW / 2, y: canvasH / 2, vx: 0, vy: 0, r: rootRadius(doneCount), isRoot: true, hue: 250, sat: 65, light: 78, mass: 6, bornAt: performance.now() });
  });

  TEST_SEQUENCE.forEach((testId, idx) => {
    if (tree[testId]) appendBranchToSchedule(schedule, testId, tree[testId], idx);
  });
  return schedule;
}

// Appends one test's branch (trunk → hubs → top-hub's profession leaves)
// to an existing schedule array. Leaves only grow off the top-scoring hub —
// keeps density readable instead of every scale sprouting a profession list.
function appendBranchToSchedule(schedule, testId, result, idx) {
  const hue = (BRANCH_HUES[idx % BRANCH_HUES.length] + hueJitter + 360) % 360;
  const trunkId = "trunk::" + testId;
  const angle = (idx / TEST_SEQUENCE.length) * Math.PI * 2 - Math.PI / 2;

  schedule.push(() => {
    const root = treeNodeById.get(ROOT_ID);
    const p = spawnNear(root, 0, angle);
    addTreeNode({ id: trunkId, label: TEST_META[testId].name, testId, x: p.x, y: p.y, vx: 0, vy: 0, r: 6, isTrunk: true, hue, sat: 45, light: 60, mass: 2, bornAt: performance.now() });
    treeEdges.push({ a: ROOT_ID, b: trunkId, kind: "trunk" });
  });

  const sorted = Object.entries(result.scores).sort((a, b) => b[1] - a[1]);
  const maxScore = sorted[0]?.[1] || 1;
  sorted.forEach(([label, score]) => {
    const hubId = testId + "::hub::" + label;
    schedule.push(() => {
      const trunk = treeNodeById.get(trunkId);
      const p = spawnNear(trunk, 22, null);
      addTreeNode({ id: hubId, label, x: p.x, y: p.y, vx: 0, vy: 0, r: 6 + (score / maxScore) * 9, isHub: true, hue, sat: 68, light: 58, mass: 3, bornAt: performance.now() });
      treeEdges.push({ a: trunkId, b: hubId, kind: "branch" });
    });
  });

  const topLabel = sorted[0]?.[0];
  const hubId = testId + "::hub::" + topLabel;
  const rich = PROF_RICH[topLabel] || {};
  const limit = testId === "onett" ? 6 : testId === "yovayshi" ? 5 : 4;
  (rich.profs || []).slice(0, limit).forEach(label => {
    schedule.push(() => {
      const hub = treeNodeById.get(hubId);
      const p = spawnNear(hub, 18, null);
      addTreeNode({ id: hubId + "::" + label, label, x: p.x, y: p.y, vx: 0, vy: 0, r: 3.5, isLeaf: true, hue, sat: 55, light: 46, mass: 1, bornAt: performance.now() });
      treeEdges.push({ a: hubId, b: hubId + "::" + label, kind: "leaf" });
    });
  });
}

function runSchedule(schedule, perDelay) {
  schedule.forEach((fn, i) => setTimeout(fn, i * perDelay));
}

// Places the full persisted tree immediately, no reveal animation — used
// to silently reconstruct prior state right before growing a brand-new
// branch, so only the new branch gets the "growing" moment.
function rebuildTreeInstant() {
  treeNodes = []; treeEdges = []; treeNodeById = new Map();
  buildTreeSchedule().forEach(fn => fn());
  hasShownTreeOnce = true;
}
// Plays the full persisted tree back node-by-node — root first, then each
// branch in order. Used on first load of the session so returning users
// still see it "grow" rather than snapping into place.
function rebuildTreeAnimated() {
  treeNodes = []; treeEdges = []; treeNodeById = new Map();
  runSchedule(buildTreeSchedule(), 70);
  hasShownTreeOnce = true;
}
// Grows just the newly-finished test's branch onto the existing tree.
function growNewBranch(testId, result, idx) {
  const schedule = [];
  appendBranchToSchedule(schedule, testId, result, idx);
  runSchedule(schedule, 110);
}

function treeStep() {
  const n = treeNodes.length;
  for (let i = 0; i < n; i++) {
    const a = treeNodes[i];
    if (a !== dragNode) {
      for (let j = i + 1; j < n; j++) {
        const b = treeNodes[j];
        let dx = a.x - b.x, dy = a.y - b.y, d2 = dx * dx + dy * dy;
        if (d2 < 4) d2 = 4;
        const d = Math.sqrt(d2), f = treePhysics.repel / d2;
        const fx = (dx / d) * f, fy = (dy / d) * f;
        a.vx += fx / a.mass; a.vy += fy / a.mass;
        if (b !== dragNode) { b.vx -= fx / b.mass; b.vy -= fy / b.mass; }
      }
      a.vx += (canvasW / 2 - a.x) * 0.0004;
      a.vy += (canvasH / 2 - a.y) * 0.0004;
    }
  }
  for (const e of treeEdges) {
    const a = treeNodeById.get(e.a), b = treeNodeById.get(e.b);
    if (!a || !b) continue;
    const rest = e.kind === "trunk" ? treePhysics.restTrunk : e.kind === "branch" ? treePhysics.restHub : treePhysics.restSat;
    let dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.max(Math.sqrt(dx * dx + dy * dy), 0.01);
    const f = treePhysics.spring * (d - rest);
    const fx = (dx / d) * f, fy = (dy / d) * f;
    if (a !== dragNode) { a.vx += fx / a.mass; a.vy += fy / a.mass; }
    if (b !== dragNode) { b.vx -= fx / b.mass; b.vy -= fy / b.mass; }
  }
  for (const p of treeNodes) {
    if (p === dragNode) continue;
    p.vx *= treePhysics.damping; p.vy *= treePhysics.damping;
    p.x += p.vx; p.y += p.vy;
  }
}

// Fits the whole tree into the visible area (below the header, above the
// footer) so a screenshot always captures everything. Interpolated so
// zoom/pan glides smoothly as new nodes arrive instead of jumping.
function updateCamera() {
  let scale = 1.1, cx = canvasW / 2, cy = canvasH / 2;
  if (treeNodes.length) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of treeNodes) {
      minX = Math.min(minX, p.x - p.r); maxX = Math.max(maxX, p.x + p.r);
      minY = Math.min(minY, p.y - p.r - 20); maxY = Math.max(maxY, p.y + p.r);
    }
    const boxW = Math.max(maxX - minX, 30), boxH = Math.max(maxY - minY, 30);
    const availW = canvasW - CAM_PAD_SIDE * 2, availH = canvasH - CAM_PAD_TOP - CAM_PAD_BOTTOM;
    scale = Math.max(0.32, Math.min(Math.min(availW / boxW, availH / boxH), 1.6));
    cx = (minX + maxX) / 2; cy = (minY + maxY) / 2;
  }
  camScale += (scale - camScale) * 0.07;
  camCX += (cx - camCX) * 0.07;
  camCY += (cy - camCY) * 0.07;
}
function camScreenCY() { return CAM_PAD_TOP + (canvasH - CAM_PAD_TOP - CAM_PAD_BOTTOM) / 2; }
function screenToWorld(x, y) {
  return { x: (x - canvasW / 2) / camScale + camCX, y: (y - camScreenCY()) / camScale + camCY };
}

function treeDraw() {
  if (!ctxEl) return;
  const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const now = performance.now();
  ctxEl.clearRect(0, 0, canvasW, canvasH);
  ctxEl.save();
  ctxEl.translate(canvasW / 2, camScreenCY());
  ctxEl.scale(camScale, camScale);
  ctxEl.translate(-camCX, -camCY);

  for (const e of treeEdges) {
    const a = treeNodeById.get(e.a), b = treeNodeById.get(e.b);
    if (!a || !b) continue;
    ctxEl.strokeStyle = dark ? "rgba(255,255,255,.12)" : "rgba(20,15,40,.14)";
    ctxEl.lineWidth = (e.kind === "trunk" ? 1.4 : 1) / camScale;
    ctxEl.beginPath(); ctxEl.moveTo(a.x, a.y); ctxEl.lineTo(b.x, b.y); ctxEl.stroke();
  }
  for (const p of treeNodes) {
    const ease = Math.min(1, 1 - Math.pow(1 - Math.min((now - p.bornAt) / POP_MS, 1), 3));
    const isHovered = p === hoveredNode;
    ctxEl.globalAlpha = ease;
    ctxEl.beginPath();
    ctxEl.shadowBlur = (p.isRoot ? 22 : p.isHub ? 13 : p.isTrunk ? 9 : 5) + (isHovered ? 10 : 0);
    ctxEl.shadowColor = `hsla(${p.hue}, ${p.sat}%, ${p.light}%, .85)`;
    ctxEl.fillStyle = p.isRoot ? (dark ? "#EDEAFB" : "#16132A") : `hsl(${p.hue}, ${p.sat}%, ${p.light}%)`;
    ctxEl.arc(p.x, p.y, p.r * ease, 0, Math.PI * 2);
    ctxEl.fill();
    if (isHovered) {
      ctxEl.lineWidth = 2 / camScale;
      ctxEl.strokeStyle = dark ? "#fff" : "#16132A";
      ctxEl.stroke();
    }
    ctxEl.shadowBlur = 0;
    ctxEl.globalAlpha = 1;
  }
  ctxEl.textAlign = "center";
  for (const p of treeNodes) {
    if (!p.isHub && !p.isRoot) continue;
    const ease = Math.min(1, (now - p.bornAt) / POP_MS);
    ctxEl.globalAlpha = ease;
    ctxEl.font = (p.isRoot ? "700 13px " : "700 11px ") + "Outfit, system-ui, sans-serif";
    ctxEl.fillStyle = dark ? "rgba(237,234,251,.92)" : "rgba(22,19,42,.92)";
    ctxEl.fillText(p.label, p.x, p.y - p.r - 7);
    ctxEl.globalAlpha = 1;
  }
  ctxEl.restore();
}

function treeLoop() {
  if (document.getElementById("screen-intro")?.classList.contains("active")) {
    treeStep(); updateCamera(); treeDraw();
  }
  requestAnimationFrame(treeLoop);
}

function pickTreeNode(x, y) {
  let best = null, bestD = 16 / camScale;
  for (const p of treeNodes) {
    const d = Math.hypot(p.x - x, p.y - y);
    if (d < Math.max(p.r + 6 / camScale, bestD)) { best = p; bestD = d; }
  }
  return best;
}
function treePointer(e) {
  const t = e.touches ? e.touches[0] : e;
  const rect = canvasEl.getBoundingClientRect();
  const sx = t.clientX - rect.left, sy = t.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  return { x: w.x, y: w.y, clientX: t.clientX, clientY: t.clientY };
}
function wireTreeInteraction() {
  const tooltip = document.getElementById("graph-tooltip");
  function onDown(e) {
    const { x, y } = treePointer(e);
    downNode = pickTreeNode(x, y);
    dragNode = downNode;
    moveDist = 0;
    if (dragNode) canvasEl.classList.add("dragging");
  }
  function onMove(e) {
    const { x, y, clientX, clientY } = treePointer(e);
    if (dragNode) {
      moveDist += Math.hypot(x - dragNode.x, y - dragNode.y);
      dragNode.x = x; dragNode.y = y; dragNode.vx = 0; dragNode.vy = 0;
      if (e.cancelable) e.preventDefault();
    }
    const hover = dragNode || pickTreeNode(x, y);
    // Hub/root nodes already show a permanent label — highlight them
    // instead of popping a redundant tooltip with the same text.
    if (hover && (hover.isHub || hover.isRoot)) {
      hoveredNode = hover;
      tooltip.style.opacity = "0";
    } else if (hover) {
      hoveredNode = null;
      tooltip.textContent = hover.label;
      tooltip.style.left = clientX + "px";
      tooltip.style.top = clientY + "px";
      tooltip.style.opacity = "1";
    } else {
      hoveredNode = null;
      tooltip.style.opacity = "0";
    }
  }
  function onUp() {
    if (downNode && moveDist < 6 && downNode.testId) {
      const next = nextTestId();
      if (downNode.testId === next) openPreviewSheet(next);
    }
    dragNode = null; downNode = null;
    canvasEl.classList.remove("dragging");
  }
  canvasEl.addEventListener("mousedown", onDown);
  canvasEl.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  canvasEl.addEventListener("touchstart", onDown, { passive: true });
  canvasEl.addEventListener("touchmove", onMove, { passive: false });
  window.addEventListener("touchend", onUp);
}

function randomizeLook() {
  hueJitter = Math.random() * 30 - 15;
  treePhysics = randomTreePhysics();
  rebuildTreeAnimated();
}

// ── Graph screen state (CTA + status pill) ──────────────────────────────
function updateGraphStatus() {
  const done = completedTests();
  const next = nextTestId();
  const cta = document.getElementById("graph-cta");
  const statusEl = document.getElementById("graph-status");
  if (!next) {
    cta.textContent = "Все 3 теста пройдены ✓";
    cta.onclick = () => {};
    statusEl.textContent = "Дерево завершено — 3 из 3";
  } else {
    const meta = TEST_META[next];
    cta.textContent = done.length ? `Продолжить: ${meta.name} · ${meta.price} →` : `Начать бесплатно: ${meta.name} →`;
    cta.onclick = () => openPreviewSheet(next);
    statusEl.textContent = done.length ? `${done.length} из 3 пройдено` : "Начни с бесплатного теста";
  }
}
function onGraphCta() {
  const next = nextTestId();
  if (next) openPreviewSheet(next);
}
function renderGraphScreen() {
  if (hasShownTreeOnce) rebuildTreeInstant();
  else rebuildTreeAnimated();
  updateGraphStatus();
}

// ── Bottom sheet ─────────────────────────────────────────────────────────
function showSheet() { document.getElementById("sheet-overlay").classList.add("active"); }
function closeSheet(e) {
  if (e && e.target.id !== "sheet-overlay") return;
  document.getElementById("sheet-overlay").classList.remove("active");
}

function openPreviewSheet(testId) {
  const meta = TEST_META[testId];
  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-handle"></div>
    <div class="tier-head-row" style="align-items:flex-start;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="tier-icon-badge">${meta.icon}</div>
        <div>
          <div class="tier-name">${meta.name}</div>
          <div class="tier-meta" style="margin-bottom:0">${meta.meta}</div>
        </div>
      </div>
      <span class="tier-price-tag">${meta.price}</span>
    </div>
    <div class="tier-feats" style="margin-bottom:18px">
      ${meta.feats.map(f => `<div class="tier-feat">${f}</div>`).join("")}
    </div>
    <button class="btn btn-primary" onclick="confirmStartTest('${testId}')">Начать тест →</button>
  `;
  showSheet();
}
function confirmStartTest(testId) {
  closeSheet();
  selectedTest = testId;
  startTest();
}

function openResultSheet(testId, data) {
  const { top_types } = data;
  const topType = top_types[0];
  const rich = PROF_RICH[topType] || {};
  const limit = testId === "onett" ? 6 : testId === "yovayshi" ? 5 : 4;
  const profs = (rich.profs || []).slice(0, limit);

  let convergence = "";
  if (completedTests().length === TEST_SEQUENCE.length) {
    const tree = loadTree();
    const tops = TEST_SEQUENCE.map(id => Object.entries(tree[id].scores).sort((a, b) => b[1] - a[1])[0][0]);
    convergence = `<div class="tier-upgrade-box" style="border-style:solid">
      <div class="tier-upgrade-box-text"><b>Все три теста пройдены.</b> Это твой независимый профиль сразу по трём методикам — ${tops.join(" · ")}.</div>
    </div>`;
  }

  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-handle"></div>
    <div class="type-hero" style="margin-bottom:14px">
      <div class="type-hero-head">
        <div class="type-hero-icon">${rich.emoji || "🎯"}</div>
        <div>
          <div class="type-hero-name">${topType}</div>
          <div class="type-hero-desc">${rich.description || "Ведущий тип профессиональных интересов"}</div>
        </div>
      </div>
      ${rich.salary ? `<div class="type-hero-salary">💰 ${rich.salary}</div>` : ""}
      <div class="type-hero-profs-label">Подходящие профессии</div>
      <div class="type-hero-profs">${profs.map(p => `<span class="type-hero-tag">${p}</span>`).join("")}</div>
    </div>
    ${convergence}
    <button class="btn btn-primary" onclick="downloadPDF()">📨 Получить PDF в Telegram</button>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeSheet()">Смотреть карту</button>
  `;
  showSheet();
}

// update last question button label
function updateNextLabel() {
  const btn = document.getElementById("btn-next");
  btn.textContent = currentQ === questions.length - 1 ? "Получить результат 🎯" : "Далее →";
}
// patch nextQuestion to update label
const _origRender = renderQuestion;
window.renderQuestion = function() {
  _origRender();
  updateNextLabel();
};

// ── History (localStorage) ───────────────────────────────────────────────
const TEST_NAMES = { ddo: "Экспресс-тест (ДДО)", yovayshi: "Склонности (Йовайши)", onett: "Международный RIASEC (O*NET)", golomshtok: "Карта интересов" };

function saveToHistory(testId, scores, topTypes, recommendations) {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  history.unshift({
    date: new Date().toLocaleDateString("ru-RU"),
    test_id: testId,
    test_name: TEST_NAMES[testId] || testId,
    scores, top_types: topTypes, recommendations,
  });
  localStorage.setItem("poprobui_history", JSON.stringify(history.slice(0, 10)));
}

function showHistory() {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  const list = document.getElementById("history-list");
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">Тестов пока нет.<br>Пройди первый тест!</div>';
  } else {
    list.innerHTML = history.map((r, i) => `
      <div class="hist-card">
        <div class="hist-card-top">
          <div class="hist-test-name">${r.test_name}</div>
          <div class="hist-date">${r.date}</div>
        </div>
        <div class="hist-tops">
          ${(r.top_types || []).slice(0,3).map((t,j) =>
            `<span class="hist-top-tag${j===0?' first':''}">${j===0?'#1 ':j===1?'#2 ':'#3 '}${t}</span>`
          ).join("")}
        </div>
        <div class="hist-actions">
          <button class="hist-btn hist-btn-view" onclick="viewHistoryResult(${i})">Смотреть</button>
          <button class="hist-btn hist-btn-pdf" onclick="pdfHistoryResult(${i})">📨 В Telegram</button>
        </div>
      </div>`).join("");
  }
  showScreen("screen-history");
}

function viewHistoryResult(i) {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  const r = history[i]; if (!r) return;
  resultScores = r.scores; resultTopTypes = r.top_types; resultRecommendations = r.recommendations || [];
  resultTestId = r.test_id || "ddo"; selectedTest = resultTestId;
  renderResults({ scores: r.scores, top_types: r.top_types, recommendations: r.recommendations });
  showScreen("screen-results");
}

function pdfHistoryResult(i) {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  const r = history[i]; if (!r) return;
  resultScores = r.scores; resultTopTypes = r.top_types; resultRecommendations = r.recommendations || [];
  resultTestId = r.test_id || "ddo"; selectedTest = resultTestId;
  downloadPDF();
}

// ── Enter key for questions ───────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const btn = document.getElementById("btn-next");
  if (btn && !btn.disabled && document.getElementById("screen-test").classList.contains("active")) {
    btn.click();
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────
initTreeCanvas();
renderGraphScreen();
treeLoop();

// ── URL params on load (e.g. after payment: ?screen=test&tier=onett&paid=1) ──
(function() {
  const p = new URLSearchParams(window.location.search);
  if (p.get("screen") === "results") {
    showHistory();
  } else if (p.get("screen") === "test") {
    const tier = p.get("tier");
    if (tier && TESTS[tier]) selectedTest = tier;
    startTest();
  }
})();

</script>
