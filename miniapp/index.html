<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Попробуй — Профориентация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #F5F5FB;
    --surface2: #EBEBF7;
    --accent: #5B54EE;
    --accent-light: #EDEEFF;
    --accent-dim: rgba(91,84,238,.12);
    --text: #0E0E1C;
    --text2: #4A4A68;
    --muted: #8E8EA8;
    --border: #E6E6F2;
    --green: #16A34A;
    --radius: 10px;
    --radius-sm: 8px;
    --font-head: 'Outfit', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0E0E18;
      --surface: #18182A;
      --surface2: #20203A;
      --text: #EDEDFA;
      --text2: #9090B8;
      --muted: #5A5A78;
      --border: #26263A;
      --accent-light: #1E1C42;
      --accent-dim: rgba(91,84,238,.18);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Screens ── */
  .screen {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
    padding: 24px 20px 140px;
  }
  .screen.active { display: flex; }

  /* ── Shared: uppercase caption label ── */
  .intro-eyebrow, .section-label, .pair-label, .type-hero-profs-label {
    font-family: var(--font-head);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.3px;
    text-transform: uppercase;
  }

  /* ── Intro ── */
  .intro-eyebrow {
    color: var(--accent);
    text-align: center;
    margin-top: 32px;
    margin-bottom: 12px;
  }
  .intro-title {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.8px;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .intro-title span { color: var(--accent); }
  .intro-sub {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    line-height: 1.65;
    margin-bottom: 32px;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
  }

  .test-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .test-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color .15s ease, background .15s ease;
    touch-action: manipulation;
  }
  .test-card:active { opacity: .85; }
  .test-card.selected { border-color: var(--accent); background: var(--accent); }

  /* ── Progress ── */
  .progress-wrap { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .35s cubic-bezier(.4,0,.2,1);
  }

  /* ── Question ── */
  .pair-label {
    color: var(--muted);
    margin-bottom: 10px;
  }
  .pair-vs {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin: 8px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .q-text {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 20px;
    color: var(--text);
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    line-height: 1.45;
    transition: border-color .15s ease, background .15s ease;
    touch-action: manipulation;
    width: 100%;
  }
  .opt-btn:active { opacity: .8; }
  .opt-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Results ── */
  .results-header { text-align: center; margin-bottom: 28px; padding-top: 8px; }
  .results-emoji {
    width: 56px;
    height: 56px;
    margin: 0 auto 12px;
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .results-title {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .results-sub { font-size: 13px; color: var(--text2); }

  .top-cards { display: flex; gap: 8px; margin-bottom: 24px; }
  .top-card {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 8px;
    text-align: center;
    border: 1.5px solid var(--border);
  }
  .top-card.first {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .top-card .rank {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    opacity: .65;
    margin-bottom: 5px;
  }
  .top-card .type-name {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
  }

  .section-label {
    color: var(--muted);
    margin-bottom: 14px;
    margin-top: 4px;
  }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-name {
    width: 110px;
    font-size: 13px;
    font-weight: 400;
    flex-shrink: 0;
    text-align: right;
    color: var(--text2);
  }
  .bar-name.hl { font-weight: 600; color: var(--accent); }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--surface2);
    border-radius: 99px;
    transition: width .7s cubic-bezier(.4,0,.2,1);
  }
  .bar-fill.hl { background: var(--accent); }

  /* ── Tier pricing cards ── */
  .test-card {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px;
  }
  .ui-icon {
    width: 20px;
    height: 20px;
    display: inline-block;
    flex-shrink: 0;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }
  .ui-icon-sm { width: 16px; height: 16px; }
  .ui-icon-lg { width: 24px; height: 24px; }

  .tier-icon-badge {
    width: 52px;
    height: 52px;
    border-radius: var(--radius);
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    flex-shrink: 0;
    transition: background .15s ease;
  }
  .tier-icon-badge .ui-icon { width: 25px; height: 25px; }
  .test-card.selected .tier-icon-badge { background: rgba(255,255,255,.22); color: #fff; }
  .tier-body { flex: 1; min-width: 0; padding-right: 26px; }
  .tier-head-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 3px;
  }
  .tier-name {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -.2px;
  }
  .test-card.selected .tier-name { color: #fff; }
  .tier-price-tag {
    font-family: var(--font-head);
    font-size: 12.5px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 7px;
    flex-shrink: 0;
    letter-spacing: -.2px;
  }
  .test-card.selected .tier-price-tag { background: rgba(255,255,255,.26); color: #fff; }
  .tier-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .test-card.selected .tier-meta { color: rgba(255,255,255,.78); }
  .tier-feats { display: flex; flex-direction: column; gap: 4px; }
  .tier-feat {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
  }
  .tier-feat::before {
    content: "✓";
    color: var(--green);
    font-size: 10px;
    font-weight: 800;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .test-card.selected .tier-feat { color: rgba(255,255,255,.92); }
  .test-card.selected .tier-feat::before { color: #fff; }
  .tier-radio {
    position: absolute;
    top: 16px; right: 16px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: transparent;
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .test-card.selected .tier-radio { background: #fff; border-color: #fff; color: var(--accent); }

  /* ── Results: type hero ── */
  .type-hero {
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px 18px;
    margin-bottom: 20px;
  }
  .type-hero-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .type-hero-icon {
    flex-shrink: 0;
    width: 60px; height: 60px;
    border-radius: var(--radius);
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
  }
  .type-hero-icon .ui-icon { width: 28px; height: 28px; }
  .type-hero-name {
    font-family: var(--font-head);
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -.3px;
    margin-bottom: 3px;
  }
  .type-hero-desc { font-size: 12.5px; color: rgba(255,255,255,.82); line-height: 1.45; }
  .type-hero-salary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.18);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .type-hero-profs-label {
    color: rgba(255,255,255,.65);
    margin-bottom: 8px;
  }
  .type-hero-profs { display: flex; flex-wrap: wrap; gap: 6px; }
  .type-hero-tag {
    background: rgba(255,255,255,.16);
    color: #fff;
    font-size: 12.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 8px;
  }

  /* ── Results: upgrade teaser ── */
  .tier-upgrade-box {
    background: var(--accent-light);
    border: 1.5px dashed var(--accent);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    text-align: left;
  }
  .tier-upgrade-box-text { font-size: 12.5px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }
  .tier-upgrade-box-btn {
    width: 100%;
    background: var(--accent);
    border: 0;
    color: #fff;
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    transition: opacity .12s;
  }
  .tier-upgrade-box-btn:active { opacity: .82; }

  /* ── Graph screen ── */
  .graph-screen { padding: 0; position: relative; overflow: hidden; }
  #tree-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  #tree-canvas.dragging { cursor: grabbing; }
  .graph-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 72px 20px 0;
    text-align: center;
    pointer-events: none;
    z-index: 2;
  }
  .graph-title { font-size: 21px; margin-bottom: 0; }
  .graph-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 5px 12px;
    border-radius: 99px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text2);
  }
  .graph-nav {
    position: absolute;
    top: 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: auto;
    z-index: 3;
  }
  .graph-nav-left { left: 20px; }
  .graph-nav-right { right: 20px; }
  .balance-pill-mini {
    height: 36px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 11px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(18, 15, 35, .06);
    white-space: nowrap;
  }
  .balance-pill-mini.is-empty { color: var(--muted); }
  .icon-btn-mini {
    width: 36px; height: 36px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
  }
  .icon-btn-mini .ui-icon { width: 18px; height: 18px; }
  .icon-btn-mini:active { opacity: .7; }
  .graph-tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    transform: translate(-50%, -140%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .1s ease;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }

  /* ── Bottom sheet ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: flex-end;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
  }
  .sheet-overlay.active { opacity: 1; pointer-events: auto; }
  .sheet {
    background: var(--bg);
    width: 100%;
    border-radius: 14px 14px 0 0;
    padding: 10px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.32,.72,0,1);
    max-height: 82vh;
    overflow-y: auto;
  }
  .sheet-overlay.active .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 6px auto 16px;
  }

  /* ── Buttons ── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 54px;
    padding: 12px 14px;
    border-radius: var(--radius);
    border: none;
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: opacity .15s ease, transform .12s ease;
    touch-action: manipulation;
    letter-spacing: -.1px;
  }
  .btn .ui-icon { width: 19px; height: 19px; }
  .btn-content {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
  .btn-copy {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    min-width: 0;
    line-height: 1.15;
    text-align: left;
  }
  .btn-label {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 750;
    color: currentColor;
  }
  .btn-sub {
    margin-top: 3px;
    font-family: var(--font-body);
    font-size: 11.5px;
    font-weight: 500;
    color: currentColor;
    opacity: .68;
  }
  .btn-simple .btn-copy { align-items: center; text-align: center; }
  .btn:active { opacity: .82; transform: scale(.98); }
  .btn:disabled {
    opacity: .48;
    cursor: not-allowed;
    transform: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text2);
    border: 1.5px solid var(--border);
    font-weight: 600;
  }
  .btn-ghost {
    background: none;
    color: var(--muted);
    font-size: 14px;
    padding: 12px;
    font-weight: 500;
  }
  .btn-row-icon {
    margin-left: auto;
    opacity: .7;
  }

  .btn-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: none;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }
  .screen.active .btn-footer { display: flex; }

  /* ── History ── */
  .history-empty { text-align: center; color: var(--muted); font-size: 15px; padding: 56px 0; }
  .hist-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    border: 1.5px solid var(--border);
  }
  .hist-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .hist-test-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; }
  .hist-date { font-size: 11px; color: var(--muted); font-weight: 500; }
  .hist-tops { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .hist-top-tag {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
  }
  .hist-top-tag.first { background: var(--accent); color: #fff; }
  .hist-actions { display: flex; gap: 8px; }
  .hist-btn {
    flex: 1;
    min-height: 38px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }
  .hist-btn .ui-icon { width: 15px; height: 15px; vertical-align: -3px; margin-right: 5px; }
  .hist-btn-view { background: var(--surface2); color: var(--text2); }
  .hist-btn-pdf { background: var(--accent); color: #fff; }

  /* ── Legal consent ── */
  .legal-consent {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin: 0 0 14px;
  }
  .legal-consent-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .legal-consent input {
    width: 18px;
    height: 18px;
    margin-top: 2px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .legal-consent-text {
    font-size: 12px;
    line-height: 1.45;
    color: var(--text2);
  }
  .legal-consent-text a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 650;
  }
  .legal-note {
    margin-top: 8px;
    font-size: 11.2px;
    line-height: 1.4;
    color: var(--muted);
  }

  /* ── Loading ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Screen: Intro (граф-пространство) ──────────────────────────────── -->
<div id="screen-intro" class="screen graph-screen active">
  <canvas id="tree-canvas"></canvas>
  <div class="graph-tooltip" id="graph-tooltip"></div>
  <div class="graph-header">
    <div class="intro-eyebrow">Попробуй</div>
    <div class="intro-title graph-title">Твоя карта интересов</div>
    <div class="graph-status" id="graph-status">Начни с бесплатного теста</div>
  </div>
  <div class="graph-nav graph-nav-left">

  } finally {

function loadTree() {
  try { return JSON.parse(localStorage.getItem("poprobui_tree") || "{}"); } catch (e) { return {}; }
}
function saveTreeResult(testId, scores, topTypes) {
  const tree = loadTree();
  tree[testId] = { scores, top_types: topTypes };
  localStorage.setItem("poprobui_tree", JSON.stringify(tree));
}
function resetLocalUserState() {
  localStorage.removeItem("poprobui_tree");
  localStorage.removeItem("poprobui_history");
  localStorage.removeItem(CONSENT_STORAGE_KEY);
  selectedTest = FREE_TEST_ID;
  questions = [];

  currentQ = 0;
  resultId = null;
  resultScores = null;
  resultTopTypes = [];

  if (pendingResultSheetTimer) {

    pendingResultSheetTimer = null;
  }
  clearTreeRuntimeState();
  rebuildTreeAnimated();
  updateGraphStatus();
  showScreen("screen-intro");
}
function completedTests() {
  const tree = loadTree();
  return TEST_SEQUENCE.filter(id => tree[id]);
}
function nextTestId() {
  const done = completedTests();
  return TEST_SEQUENCE.find(id => !done.includes(id)) || null;
}

// ── Question rendering ───────────────────────────────────────────────────
function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round(currentQ / total * 100);

  document.getElementById("q-counter").textContent = `Вопрос ${currentQ + 1} из ${total}`;
  document.getElementById("q-pct").textContent = `${pct}%`;
  document.getElementById("progress-fill").style.width = `${pct}%`;
  document.getElementById("btn-next").disabled = !answers[q.id];

  const body = document.getElementById("q-body");

  if (q.type === "pair") {
    body.innerHTML = `
      <div class="pair-label">Что тебе больше нравится?</div>
      <button class="opt-btn ${answers[q.id]==='a'?'selected':''}" onclick="selectAnswer('a')">
        ${q.a}
      </button>
      <div class="pair-vs">или</div>
      <button class="opt-btn ${answers[q.id]==='b'?'selected':''}" onclick="selectAnswer('b')">
        ${q.b}
      </button>
    `;
  } else if (q.type === "choice3") {
    body.innerHTML = `
      <div class="q-text">${q.text}</div>
      <div class="options">
        <button class="opt-btn ${answers[q.id]==='a'?'selected':''}" onclick="selectAnswer('a')">А. ${q.a}</button>
        <button class="opt-btn ${answers[q.id]==='b'?'selected':''}" onclick="selectAnswer('b')">Б. ${q.b}</button>
        <button class="opt-btn ${answers[q.id]==='c'?'selected':''}" onclick="selectAnswer('c')">В. ${q.c}</button>
      </div>
    `;
  } else if (q.type === "scale5") {
    const labels = ["Совсем нет","Не очень","Нейтрально","Нравится","Очень нравится"];
    body.innerHTML = `
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${[1,2,3,4,5].map(v => `
          <button class="opt-btn ${answers[q.id]==v?'selected':''}" onclick="selectAnswer(${v})">
            ${v}. ${labels[v-1]}
          </button>
        `).join("")}
      </div>
    `;
  }
}

function selectAnswer(val) {
  answers[questions[currentQ].id] = val;
  document.getElementById("btn-next").disabled = false;
  renderQuestion();
}

function nextQuestion() {
  if (!answers[questions[currentQ].id]) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    submitAnswers();
  }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
  else showScreen("screen-intro");
}

document.getElementById("btn-next").addEventListener("click", () => {});

// ── Submit & Results ─────────────────────────────────────────────────────
async function submitAnswers() {
  showScreen("screen-loading");
  resultTestId = selectedTest;
  // last question label
  document.getElementById("btn-next").innerHTML = cta("Далее", "", "", "arrowRight");

  try {
    const res = await fetchWithTimeout(`${API_URL}/submit`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        tg_user_id: TG_USER_ID,
        test_id: selectedTest,
        answers: answers,
      })
    }, 4500);
    const data = await res.json();
    resultId = data.result_id;
    handleTestComplete(data);
  } catch(e) {
    // offline fallback — local scoring
    const scores = localScore();
    const topTypes = Object.keys(scores).sort((a,b)=>scores[b]-scores[a]).slice(0,3);
    handleTestComplete({ scores, top_types: topTypes, recommendations: [] });
  }
}

// Called once a test is scored (server or offline). Persists into history +
// the tree, then returns to the graph screen and grows the new branch in
// with the staged reveal animation before showing the result sheet.
function handleTestComplete(data) {
  resultScores = data.scores;
  resultTopTypes = data.top_types;
  resultRecommendations = data.recommendations || [];
  saveTreeResult(selectedTest, data.scores, data.top_types);
  saveToHistory(selectedTest, data.scores, data.top_types, data.recommendations);

  showScreen("screen-intro");
  rebuildTreeInstant(); // silently place what was already there — no replay
  const root = treeNodeById.get(ROOT_ID);
  if (root) { root.r = rootRadius(completedTests().length); root.bornAt = performance.now(); } // pulse
  updateGraphStatus();
  growNewBranch(selectedTest, { scores: data.scores, top_types: data.top_types }, TEST_SEQUENCE.indexOf(selectedTest));
  if (pendingResultSheetTimer) clearTimeout(pendingResultSheetTimer);
  pendingResultSheetTimer = setTimeout(() => {
    pendingResultSheetTimer = null;
    openResultSheet(selectedTest, data);
  }, 900);
}

// ── Local scoring fallback (offline) ────────────────────────────────────
function localScore() {
  if (selectedTest === "ddo") {
    const KEY = {
      "Природа":  [["q1","a"],["q3","b"],["q6","a"],["q10","a"],["q11","a"],["q13","b"],["q16","a"],["q20","a"]],
      "Техника":  [["q1","b"],["q4","a"],["q7","b"],["q9","a"],["q11","b"],["q14","a"],["q17","b"],["q19","a"]],
      "Человек":  [["q2","a"],["q4","b"],["q6","b"],["q8","a"],["q12","a"],["q14","b"],["q16","b"],["q18","a"]],
      "Знак":     [["q2","b"],["q5","a"],["q9","b"],["q10","b"],["q12","b"],["q15","a"],["q19","b"],["q20","b"]],
      "Образ":    [["q3","a"],["q5","b"],["q7","a"],["q8","b"],["q13","a"],["q15","b"],["q17","a"],["q18","b"]],
    };
    const s = {};
    for (const [scale, pairs] of Object.entries(KEY)) {
      s[scale] = pairs.filter(([q,v]) => answers[q] === v).length;
    }
    return s;
  }
  if (selectedTest === "yovayshi") {
    const scores = {};
    for (const [q, scaleMap] of Object.entries(YOVAYSHI_KEY)) {
      const ans = answers[q];
      if (ans && scaleMap[ans]) scores[scaleMap[ans]] = (scores[scaleMap[ans]] || 0) + 1;
    }
    for (const s of ["Люди","Исследование","Производство","Эстетика","Экстремал","Планово-экон."]) {
      if (!(s in scores)) scores[s] = 0;
    }
    return scores;
  }
  if (selectedTest === "onett") {
    const RANGES = {
      "R — Реалист": [1,10], "I — Исследователь": [11,20], "A — Художник": [21,30],
      "S — Социальный": [31,40], "E — Предприниматель": [41,50], "C — Конвенциональный": [51,60],
    };
    const scores = {};
    for (const [label, [start, end]] of Object.entries(RANGES)) {
      let sum = 0;
      for (let i = start; i <= end; i++) sum += Number(answers[`q${i}`] || 3);
      scores[label] = sum;
    }
    return scores;
  }
  return {};
}

// ── Profile map: core → profile planets → profession satellites ──────────
// The visual model is intentionally simple: "Ты" is the biggest core, major
// interest spheres orbit it, and small profession satellites orbit each sphere.
const ROOT_ID = "__root__";
const POP_MS = 320; // per-node pop-in duration
const CAM_PAD_TOP = 118, CAM_PAD_BOTTOM = 104, CAM_PAD_SIDE = 20;

let treeNodes = [], treeEdges = [], treeNodeById = new Map();
let treePhysics = graphPhysics();
let hueJitter = Math.random() * 30 - 15;
let canvasEl, ctxEl, canvasW = 0, canvasH = 0;
let dragNode = null, downNode = null, moveDist = 0, hoveredNode = null;
let hasShownTreeOnce = false;
let camScale = 1, camCX = 0, camCY = 0;
let treeScheduleTimers = [];

function rootRadius(doneCount) { return 42 + Math.min(doneCount, 3) * 2; }

function graphPhysics() {
  return {
    repel: 1050,
    spring: 0.0058,
    restPlanet: 86,
    restSat: 28,
    damping: 0.76,
    maxSpeed: 1.75,
  };
}

function planetRadius(score, rank, testCount) {
  const s = Math.max(0, Math.min(score || 0, 1));
  const rankBoost = rank === 0 ? 11 : rank === 1 ? 6 : rank === 2 ? 3 : 0;
  const confidence = Math.min(testCount || 1, 3) * 1.1;
  return Math.min(36, 12 + Math.pow(s, 0.62) * 13 + rankBoost + confidence);
}

function leafRadius(confirmCount) {
  return Math.min(3.8 + Math.max(0, (confirmCount || 1) - 1) * 2.2, 9);
}

function initTreeCanvas() {
  canvasEl = document.getElementById("tree-canvas");
  if (!canvasEl) return;
  ctxEl = canvasEl.getContext("2d");
  resizeTreeCanvas();
  window.addEventListener("resize", resizeTreeCanvas);
  wireTreeInteraction();
}
let pendingCanvasResize = false;
function resizeTreeCanvas() {
  const w = canvasEl.parentElement.clientWidth;
  const h = canvasEl.parentElement.clientHeight;
  // Resize events fire while the graph screen is hidden (e.g. Telegram's
  // viewport changes during the question flow) — a hidden parent measures
  // 0×0, which would blank the canvas until reload. Defer; treeLoop
  // re-syncs the size as soon as the screen is visible again.
  if (!w || !h) { pendingCanvasResize = true; return; }
  pendingCanvasResize = false;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvasW = w;
  canvasH = h;
  canvasEl.width = canvasW * dpr; canvasEl.height = canvasH * dpr;
  canvasEl.style.width = canvasW + "px"; canvasEl.style.height = canvasH + "px";
  ctxEl.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (!treeNodes.length) { camCX = canvasW / 2; camCY = canvasH / 2; camScale = 1.1; }
}

function addTreeNode(n) {
  n.glassX = n.x;
  n.glassY = n.y;
  // Stiff spring: lens follows the ball almost 1:1 and hides it; only a
  // fast flick makes it trail and flash the bright core. Heavier lenses
  // (root) are a touch lazier for a subtle sense of weight.
  n.glassLag = n.isRoot ? 0.3 : n.isHub ? 0.38 : 0.45;
  treeNodes.push(n);
  treeNodeById.set(n.id, n);
}
function clearTreeScheduleTimers() {
  treeScheduleTimers.forEach(id => clearTimeout(id));
  treeScheduleTimers = [];
}
function clearTreeRuntimeState() {
  clearTreeScheduleTimers();
  treeNodes = [];
  treeEdges = [];
  treeNodeById = new Map();
  treePhysics = graphPhysics();
  dragNode = null;
  downNode = null;
  moveDist = 0;
  hoveredNode = null;
  hasShownTreeOnce = false;
  camCX = canvasW / 2;
  camCY = canvasH / 2;
  camScale = 1.1;
}
function spawnNear(parent, jitter, angle) {
  const a = angle != null ? angle : Math.random() * Math.PI * 2;
  const d = angle != null ? 55 : 6 + Math.random() * jitter;
  return {
    x: (parent ? parent.x : canvasW / 2) + Math.cos(a) * d,
    y: (parent ? parent.y : canvasH / 2) + Math.sin(a) * d,
  };
}

// Conceptual cross-reference: ДДО, Йовайши and RIASEC are three different
// instruments, but several of their scales measure the SAME underlying trait.
const HUB_GROUP_OF = {
  "Техника": "tech", "Производство": "tech", "R — Реалист": "tech",
  "Человек": "social", "Люди": "social", "S — Социальный": "social",
  "Образ": "art", "Эстетика": "art", "A — Художник": "art",
  "Знак": "data", "Планово-экон.": "data", "C — Конвенциональный": "data",
  "Исследование": "research", "I — Исследователь": "research",
  "Природа": "nature",
  "Экстремал": "extreme",
  "E — Предприниматель": "business",
};
const HUB_GROUP_LABEL = {
  tech: "Техническое", social: "Социальное", art: "Творческое", data: "Системное",
  research: "Исследовательское", nature: "Природа", extreme: "Экстремал", business: "Предприниматель",
};
const HUB_GROUP_HUE = {
  tech: 202, social: 156, art: 286, data: 224,
  research: 334, nature: 132, extreme: 18, business: 38,
};
// Vivid modern palette tuned for the glass-lens style: the color is only a
// glowing stain under milky glass, so it needs to be saturated and bright
// to read through. Hues spaced so any 3-8 planets look balanced together.
const HUB_GROUP_TONE = {
  tech: { hue: 221, sat: 90, light: 56 },      // bright blue
  social: { hue: 168, sat: 78, light: 45 },    // teal
  art: { hue: 288, sat: 78, light: 58 },       // purple
  data: { hue: 245, sat: 84, light: 62 },      // indigo
  research: { hue: 330, sat: 82, light: 56 },  // magenta
  nature: { hue: 132, sat: 68, light: 46 },    // green
  extreme: { hue: 8, sat: 84, light: 56 },     // coral red
  business: { hue: 36, sat: 92, light: 52 },   // amber
};
// Root core is a RANDOM bright two-hue gradient, regenerated by the ⟳
// button. Kept under the ROOT_TONE name (hue/sat/light still present) so
// existing checks and shadow/label code keep working.
function makeRootTone() {
  const h1 = Math.random() * 360;
  const h2 = (h1 + 42 + Math.random() * 48) % 360;
  return { hue: h1, hue2: h2, sat: 90, light: 57 };
}
let ROOT_TONE = makeRootTone();

function toneForGroup(groupId, rank = 0) {
  const base = HUB_GROUP_TONE[groupId] || { hue: 210, sat: 46, light: 50 };
  return {
    hue: (base.hue + hueJitter * 0.22 + 360) % 360,
    sat: Math.max(48, base.sat - Math.min(rank, 5) * 2.5),
    light: Math.max(38, Math.min(60, base.light + (rank === 0 ? 2 : 0) - Math.min(rank, 4) * 1.1)),
  };
}

function aggregateProfile(tree) {
  const groups = new Map();
  const done = TEST_SEQUENCE.filter(id => tree[id]);

  done.forEach(testId => {
    const result = tree[testId];
    const sorted = Object.entries(result.scores || {}).sort((a, b) => b[1] - a[1]);
    const maxScore = sorted[0]?.[1] || 1;
    sorted.forEach(([label, score]) => {
      const groupId = HUB_GROUP_OF[label] || ("solo::" + label);
      const norm = Math.max(0, score / maxScore);
      if (!groups.has(groupId)) {
        groups.set(groupId, {
          id: groupId,
          label: HUB_GROUP_LABEL[groupId] || label,
          hue: HUB_GROUP_HUE[groupId] ?? 210,
          strengthSum: 0,
          testIds: new Set(),
          bestLabel: label,
          bestNorm: 0,
          profs: new Map(),
        });
      }
      const g = groups.get(groupId);
      g.strengthSum += norm;
      g.testIds.add(testId);
      if (norm > g.bestNorm) { g.bestNorm = norm; g.bestLabel = label; }
      const rich = PROF_RICH[label] || {};
      (rich.profs || []).slice(0, 6).forEach((prof, i) => {
        g.profs.set(prof, (g.profs.get(prof) || 0) + norm * (1 - i * 0.08));
      });
    });
  });

  return Array.from(groups.values())
    .map(g => ({ ...g, score: done.length ? g.strengthSum / done.length : 0 }))
    .sort((a, b) => b.score - a.score);
}

// ── Build order: root first, then profile spheres, then profession satellites.
function buildTreeSchedule() {
  const schedule = [];
  const tree = loadTree();
  const doneCount = TEST_SEQUENCE.filter(id => tree[id]).length;
  const planets = aggregateProfile(tree);

  schedule.push(() => {
    const name = tg?.initDataUnsafe?.user?.first_name || "Ты";
    addTreeNode({
      id: ROOT_ID, label: name,
      x: canvasW / 2, y: canvasH / 2,
      vx: 0, vy: 0, r: rootRadius(doneCount),
      isRoot: true, hue: ROOT_TONE.hue, hue2: ROOT_TONE.hue2, sat: ROOT_TONE.sat, light: ROOT_TONE.light,
      mass: 18, fixedCore: true, bornAt: performance.now(),
    });
  });

  const count = Math.max(planets.length, 1);
  planets.forEach((planet, rank) => {
    const id = "hub::" + planet.id;
    const angle = -Math.PI / 2 + rank * (Math.PI * 2 / count);
    const orbit = 118 + Math.min(rank, 3) * 8;
    schedule.push(() => {
      const root = treeNodeById.get(ROOT_ID);
      const r = planetRadius(planet.score, rank, planet.testIds.size);
      const tone = toneForGroup(planet.id, rank);
      const p = {
        x: root.x + Math.cos(angle) * orbit,
        y: root.y + Math.sin(angle) * orbit,
      };
      addTreeNode({
        id, label: planet.label, x: p.x, y: p.y, vx: 0, vy: 0,
        r, isHub: true, isPrimary: rank < 3,
        hue: tone.hue, sat: tone.sat, light: tone.light,
        mass: 6 + r * 0.18, score: planet.score, rank,
        fromTests: planet.testIds, isConverged: planet.testIds.size >= 2,
        bornAt: performance.now(),
      });
      treeEdges.push({ a: ROOT_ID, b: id, kind: "planet", converged: planet.testIds.size >= 2, strength: planet.score });
    });

    const profs = Array.from(planet.profs.entries())
      .sort((a, b) => b[1] - a[1])
      .slice(0, rank < 3 ? 5 : 2);
    profs.forEach(([profName, weight], i) => {
      const profId = "prof::" + planet.id + "::" + profName;
      const satAngle = angle + (i - (profs.length - 1) / 2) * 0.48;
      const satOrbit = 54 + i * 6;
      schedule.push(() => {
        const hub = treeNodeById.get(id);
        if (!hub) return;
        const tone = toneForGroup(planet.id, rank);
        addTreeNode({
          id: profId, label: profName,
          x: hub.x + Math.cos(satAngle) * satOrbit,
          y: hub.y + Math.sin(satAngle) * satOrbit,
          vx: 0, vy: 0, r: leafRadius(weight > 1.6 ? 2 : 1),
          isLeaf: true, showLabel: rank < 3,
          hue: tone.hue, sat: Math.max(46, tone.sat - 14), light: Math.max(34, tone.light - 8),
          mass: 1.1, bornAt: performance.now(),
        });
        treeEdges.push({ a: id, b: profId, kind: "leaf", converged: rank < 3 });
      });
    });
  });
  return schedule;
}

function runSchedule(schedule, perDelay) {
  clearTreeScheduleTimers();
  schedule.forEach((fn, i) => {
    const timer = setTimeout(() => {
      fn();
      treeScheduleTimers = treeScheduleTimers.filter(id => id !== timer);
    }, i * perDelay);
    treeScheduleTimers.push(timer);
  });
}

// Places the full persisted tree immediately, no reveal animation — used
// to silently reconstruct prior state right before growing a brand-new
// branch, so only the new branch gets the "growing" moment.
function rebuildTreeInstant() {
  clearTreeRuntimeState();
  buildTreeSchedule().forEach(fn => fn());
  hasShownTreeOnce = true;
}
// Plays the full persisted tree back node-by-node — root first, then each
// branch in order. Used on first load of the session so returning users
// still see it "grow" rather than snapping into place.
function rebuildTreeAnimated() {
  clearTreeRuntimeState();
  runSchedule(buildTreeSchedule(), 95);
  hasShownTreeOnce = true;
}
// Rebuilds the profile map after a test changes the aggregate picture.
function growNewBranch() {
  rebuildTreeAnimated();
}

function treeStep() {
  const n = treeNodes.length;
  for (let i = 0; i < n; i++) {
    const a = treeNodes[i];
    if (a !== dragNode) {
      for (let j = i + 1; j < n; j++) {
        const b = treeNodes[j];
        let dx = a.x - b.x, dy = a.y - b.y, d2 = dx * dx + dy * dy;
        if (d2 < 4) d2 = 4;
        const d = Math.sqrt(d2), f = treePhysics.repel / d2;
        const fx = (dx / d) * f, fy = (dy / d) * f;
        a.vx += fx / a.mass; a.vy += fy / a.mass;
        if (b !== dragNode) { b.vx -= fx / b.mass; b.vy -= fy / b.mass; }
      }
      const centerPull = a.isRoot ? 0.006 : 0.00018;
      a.vx += (canvasW / 2 - a.x) * centerPull;
      a.vy += (canvasH / 2 - a.y) * centerPull;
    }
  }
  for (const e of treeEdges) {
    const a = treeNodeById.get(e.a), b = treeNodeById.get(e.b);
    if (!a || !b) continue;
    const baseRest = e.kind === "planet" ? treePhysics.restPlanet : treePhysics.restSat;
    const rest = baseRest + (a.r + b.r) * (e.kind === "leaf" ? 0.9 : 0.65);
    let dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.max(Math.sqrt(dx * dx + dy * dy), 0.01);
    const f = treePhysics.spring * (d - rest);
    const fx = (dx / d) * f, fy = (dy / d) * f;
    if (a !== dragNode) { a.vx += fx / a.mass; a.vy += fy / a.mass; }
    if (b !== dragNode) { b.vx -= fx / b.mass; b.vy -= fy / b.mass; }
  }
  for (const p of treeNodes) {
    if (p !== dragNode) {
      p.vx *= treePhysics.damping; p.vy *= treePhysics.damping;
      const speed = Math.hypot(p.vx, p.vy);
      if (speed > treePhysics.maxSpeed) {
        const k = treePhysics.maxSpeed / speed;
        p.vx *= k; p.vy *= k;
      }
      p.x += p.vx; p.y += p.vy;
    }
    // Glass chases the ball for EVERY node — including the one being
    // dragged (it used to be skipped, so the lens froze mid-drag and only
    // caught up on release). The spring is stiff: at normal speeds the
    // lens visually sticks to the ball's center and hides it; only a fast
    // flick outruns it and reveals the bright core underneath.
    if (p.glassX == null) p.glassX = p.x;
    if (p.glassY == null) p.glassY = p.y;
    const lag = p.glassLag || 0.4;
    p.glassX += (p.x - p.glassX) * lag;
    p.glassY += (p.y - p.glassY) * lag;
  }
}

// Fits the whole tree into the visible area (below the header, above the
// footer) so a screenshot always captures everything. Interpolated so
// zoom/pan glides smoothly as new nodes arrive instead of jumping.
function updateCamera() {
  let scale = 1.1, cx = canvasW / 2, cy = canvasH / 2;
  if (treeNodes.length) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const p of treeNodes) {
      const labelPad = (p.isHub || p.isRoot || p.isConverged || p.showLabel) ? Math.min(92, Math.max(22, p.label.length * 4.4)) : 6;
      minX = Math.min(minX, p.x - p.r - labelPad);
      maxX = Math.max(maxX, p.x + p.r + labelPad);
      minY = Math.min(minY, p.y - p.r - 24);
      maxY = Math.max(maxY, p.y + p.r + 10);
    }
    const boxW = Math.max(maxX - minX, 30), boxH = Math.max(maxY - minY, 30);
    const availW = canvasW - CAM_PAD_SIDE * 2, availH = canvasH - CAM_PAD_TOP - CAM_PAD_BOTTOM;
    scale = Math.max(0.32, Math.min(Math.min(availW / boxW, availH / boxH), 1.6));
    cx = (minX + maxX) / 2; cy = (minY + maxY) / 2;
  }
  camScale += (scale - camScale) * 0.045;
  camCX += (cx - camCX) * 0.045;
  camCY += (cy - camCY) * 0.045;
}
function camScreenCY() { return CAM_PAD_TOP + (canvasH - CAM_PAD_TOP - CAM_PAD_BOTTOM) / 2; }
function screenToWorld(x, y) {
  return { x: (x - canvasW / 2) / camScale + camCX, y: (y - camScreenCY()) / camScale + camCY };
}

function treeDraw() {
  if (!ctxEl) return;
  const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const now = performance.now();
  ctxEl.clearRect(0, 0, canvasW, canvasH);
  // Cool off-white backing so the milky lenses read against the page —
  // pure white glass on a pure white body would only be visible by shadow.
  if (!dark) {
    const bg = ctxEl.createLinearGradient(0, 0, 0, canvasH);
    bg.addColorStop(0, "#F6F7FB");
    bg.addColorStop(1, "#EDEFF6");
    ctxEl.fillStyle = bg;
    ctxEl.fillRect(0, 0, canvasW, canvasH);
  }
  ctxEl.save();
  ctxEl.translate(canvasW / 2, camScreenCY());
  ctxEl.scale(camScale, camScale);
  ctxEl.translate(-camCX, -camCY);

  for (const e of treeEdges) {
    const a = treeNodeById.get(e.a), b = treeNodeById.get(e.b);
    if (!a || !b) continue;
    ctxEl.strokeStyle = e.converged
      ? (dark ? "rgba(178,168,255,.42)" : "rgba(96,104,138,.22)")
      : (dark ? "rgba(255,255,255,.13)" : "rgba(96,104,138,.16)");
    ctxEl.lineWidth = (e.kind === "planet" ? 1.5 + (e.strength || 0) * 1.4 : e.converged ? 1.4 : 0.9) / camScale;
    ctxEl.beginPath(); ctxEl.moveTo(a.x, a.y); ctxEl.lineTo(b.x, b.y); ctxEl.stroke();
  }

  // Figma-reference node: bright saturated core sits UNDER a large milky
  // glass lens. The lens is the node's body (radius = p.r) drawn at the
  // lagged glass position, so it trails the core in motion and settles
  // centered over it at rest. The core peeks out down-right as a crisp
  // crescent; inside the lens the same color reads as a blurred stain.
  for (const p of treeNodes) {
    const ease = Math.min(1, 1 - Math.pow(1 - Math.min((now - p.bornAt) / POP_MS, 1), 3));
    if (ease <= 0.01) continue;
    const isHovered = p === hoveredNode;
    const g = p.r * ease;                       // lens radius
    const gx = p.glassX ?? p.x, gy = p.glassY ?? p.y;
    // Core is dead-center under the lens and fully hidden at rest — it
    // only flashes out when a fast drag makes the lens trail behind.
    const coreR = g * (p.isLeaf ? 0.68 : 0.6);
    const cx = p.x, cy = p.y;
    const coreColor = `hsl(${p.hue}, ${p.sat}%, ${p.light}%)`;
    ctxEl.globalAlpha = ease;

    // hover: soft colored halo behind the lens (spec says no strokes)
    if (isHovered) {
      const halo = ctxEl.createRadialGradient(gx, gy, g * 0.7, gx, gy, g * 1.45);
      halo.addColorStop(0, `hsla(${p.hue}, ${p.sat}%, ${p.light}%, .22)`);
      halo.addColorStop(1, `hsla(${p.hue}, ${p.sat}%, ${p.light}%, 0)`);
      ctxEl.fillStyle = halo;
      ctxEl.beginPath();
      ctxEl.arc(gx, gy, g * 1.45, 0, Math.PI * 2);
      ctxEl.fill();
    }

    // 1. crisp bright core under the lens
    ctxEl.shadowBlur = 4 + coreR * 0.5;
    ctxEl.shadowColor = `hsla(${p.hue}, ${p.sat}%, ${Math.min(64, p.light + 6)}%, .4)`;
    if (p.isRoot && p.hue2 != null) {
      const coreGrad = ctxEl.createLinearGradient(cx - coreR, cy - coreR, cx + coreR, cy + coreR);
      coreGrad.addColorStop(0, `hsl(${p.hue}, ${p.sat}%, ${Math.min(64, p.light + 6)}%)`);
      coreGrad.addColorStop(1, `hsl(${p.hue2}, ${p.sat}%, ${Math.max(48, p.light - 4)}%)`);
      ctxEl.fillStyle = coreGrad;
    } else {
      ctxEl.fillStyle = coreColor;
    }
    ctxEl.beginPath();
    ctxEl.arc(cx, cy, Math.max(0.5, coreR), 0, Math.PI * 2);
    ctxEl.fill();

    // 2. milky matte lens on top — bigger lens, wider/softer drop shadow
    ctxEl.shadowColor = dark ? "rgba(0,0,0,.5)" : "rgba(35,42,74,.16)";
    ctxEl.shadowBlur = 8 + g * 0.9;
    ctxEl.shadowOffsetY = 2 + g * 0.14;
    const lens = ctxEl.createRadialGradient(
      gx - g * 0.35, gy - g * 0.4, Math.max(1, g * 0.1),
      gx, gy, Math.max(1, g)
    );
    if (dark) {
      lens.addColorStop(0, "rgba(255,255,255,.34)");
      lens.addColorStop(0.6, "rgba(255,255,255,.18)");
      lens.addColorStop(1, "rgba(255,255,255,.10)");
    } else {
      lens.addColorStop(0, "rgba(255,255,255,.99)");
      lens.addColorStop(0.55, "rgba(253,253,255,.96)");
      lens.addColorStop(1, "rgba(243,245,252,.9)");
    }
    ctxEl.fillStyle = lens;
    ctxEl.beginPath();
    ctxEl.arc(gx, gy, g, 0, Math.PI * 2);
    ctxEl.fill();
    ctxEl.shadowBlur = 0;
    ctxEl.shadowOffsetY = 0;

    // 3. blurred color stain inside the lens (clipped) — bigger lens →
    // softer, wider falloff (blur is faked with gradient stops: no
    // ctx.filter, it's unsupported in older iOS WebViews)
    ctxEl.save();
    ctxEl.beginPath();
    ctxEl.arc(gx, gy, g, 0, Math.PI * 2);
    ctxEl.clip();
    const softness = Math.min(0.62, 0.34 + g * 0.008); // larger => blurrier
    const sx = p.x, sy = p.y + g * 0.1; // centered on the ball, slight depth
    const drawStain = (hue, offX) => {
      const stain = ctxEl.createRadialGradient(sx + offX, sy, 1, sx + offX, sy, Math.max(1, g * 0.92));
      stain.addColorStop(0, `hsla(${hue}, ${Math.min(96, p.sat + 4)}%, ${Math.min(62, p.light + 4)}%, .74)`);
      stain.addColorStop(softness, `hsla(${hue}, ${p.sat}%, ${p.light}%, .3)`);
      stain.addColorStop(1, `hsla(${hue}, ${p.sat}%, ${p.light}%, 0)`);
      ctxEl.fillStyle = stain;
      ctxEl.beginPath();
      ctxEl.arc(gx, gy, g, 0, Math.PI * 2);
      ctxEl.fill();
    };
    if (p.isRoot && p.hue2 != null) {
      drawStain(p.hue, -g * 0.28);
      drawStain(p.hue2, g * 0.26);
    } else {
      drawStain(p.hue, 0);
    }
    // top-left micro highlight — keeps the lens reading as glossy glass
    ctxEl.globalAlpha = ease * (dark ? 0.3 : 0.5);
    const hi = ctxEl.createRadialGradient(
      gx - g * 0.38, gy - g * 0.42, 1,
      gx - g * 0.38, gy - g * 0.42, Math.max(1, g * 0.34)
    );
    hi.addColorStop(0, "rgba(255,255,255,.95)");
    hi.addColorStop(1, "rgba(255,255,255,0)");
    ctxEl.fillStyle = hi;
    ctxEl.beginPath();
    ctxEl.arc(gx - g * 0.38, gy - g * 0.42, Math.max(1, g * 0.34), 0, Math.PI * 2);
    ctxEl.fill();
    ctxEl.restore();

    ctxEl.globalAlpha = 1;
  }
  ctxEl.textAlign = "center";
  for (const p of treeNodes) {
    if (!p.isHub && !p.isRoot && !p.isConverged && !p.showLabel) continue;
    const ease = Math.min(1, (now - p.bornAt) / POP_MS);
    ctxEl.globalAlpha = ease;
    const labelSize = p.isRoot ? 14 : p.isHub ? Math.max(11, Math.min(16, p.r * 0.48)) : 9.5;
    ctxEl.font = `${p.isLeaf ? 650 : 700} ${labelSize}px Outfit, system-ui, sans-serif`;
    ctxEl.fillStyle = p.isRoot
      ? (dark ? "rgba(33,30,58,.96)" : "rgba(42,37,78,.96)")
      : p.isLeaf
        ? (dark ? "rgba(237,234,251,.72)" : "rgba(43,50,72,.62)")
        : p.isConverged
          ? (dark ? "rgba(230,226,255,.96)" : "rgba(54,48,108,.94)")
          : (dark ? "rgba(237,234,251,.92)" : "rgba(43,50,72,.92)");
    ctxEl.fillText(p.label, p.x, p.y - p.r - 7);
    ctxEl.globalAlpha = 1;
  }
  ctxEl.restore();
}

function treeLoop() {
  if (document.getElementById("screen-intro")?.classList.contains("active")) {
    // Self-heal: if a resize landed while this screen was hidden, the
    // canvas size is stale — re-measure now that it's visible.
    if (pendingCanvasResize || !canvasW || !canvasH) resizeTreeCanvas();
    treeStep(); updateCamera(); treeDraw();
  }
  requestAnimationFrame(treeLoop);
}

function pickTreeNode(x, y) {
  let best = null, bestD = 16 / camScale;
  for (const p of treeNodes) {
    const d = Math.hypot(p.x - x, p.y - y);
    if (d < Math.max(p.r + 6 / camScale, bestD)) { best = p; bestD = d; }
  }
  return best;
}
function treePointer(e) {
  const t = e.touches ? e.touches[0] : e;
  const rect = canvasEl.getBoundingClientRect();
  const sx = t.clientX - rect.left, sy = t.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  return { x: w.x, y: w.y, clientX: t.clientX, clientY: t.clientY };
}
function wireTreeInteraction() {
  const tooltip = document.getElementById("graph-tooltip");
  function onDown(e) {
    const { x, y } = treePointer(e);
    downNode = pickTreeNode(x, y);
    dragNode = downNode;
    moveDist = 0;
    if (dragNode) canvasEl.classList.add("dragging");
  }
  function onMove(e) {
    const { x, y, clientX, clientY } = treePointer(e);
    if (dragNode) {
      moveDist += Math.hypot(x - dragNode.x, y - dragNode.y);
      dragNode.x = x; dragNode.y = y; dragNode.vx = 0; dragNode.vy = 0;
      if (e.cancelable) e.preventDefault();
    }
    const hover = dragNode || pickTreeNode(x, y);
    // Hub/root/converged nodes already show a permanent label — highlight
    // them instead of popping a redundant tooltip with the same text.
    if (hover && (hover.isHub || hover.isRoot || hover.isConverged)) {
      hoveredNode = hover;
      tooltip.style.opacity = "0";
    } else if (hover) {
      hoveredNode = null;
      tooltip.textContent = hover.label;
      tooltip.style.left = clientX + "px";
      tooltip.style.top = clientY + "px";
      tooltip.style.opacity = "1";
    } else {
      hoveredNode = null;
      tooltip.style.opacity = "0";
    }
  }
  function onUp() {
    if (downNode && moveDist < 6 && downNode.isRoot) onGraphCta();
    dragNode = null; downNode = null;
    canvasEl.classList.remove("dragging");
  }
  canvasEl.addEventListener("mousedown", onDown);
  canvasEl.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  canvasEl.addEventListener("touchstart", onDown, { passive: true });
  canvasEl.addEventListener("touchmove", onMove, { passive: false });
  window.addEventListener("touchend", onUp);
}

function randomizeLook() {
  hueJitter = Math.random() * 30 - 15;
  ROOT_TONE = makeRootTone();
  treePhysics = graphPhysics();
  rebuildTreeAnimated();
}

// ── Graph screen state (CTA + status pill) ──────────────────────────────
function updateGraphStatus() {
  const done = completedTests();
  const next = nextTestId();
  const ctaEl = document.getElementById("graph-cta");
  const statusEl = document.getElementById("graph-status");
  if (!next) {
    ctaEl.innerHTML = cta("Смотреть результаты", "Все 3 теста пройдены", "chart");
    ctaEl.onclick = () => showHistory();
    statusEl.textContent = "Дерево завершено — 3 из 3";
  } else {
    const meta = TEST_META[next];
    ctaEl.innerHTML = done.length
      ? cta(`Продолжить: ${meta.name}`, meta.price, meta.icon)
      : cta("Начать бесплатно", meta.name, meta.icon);
    ctaEl.onclick = () => openPreviewSheet(next);
    statusEl.textContent = done.length ? `${done.length} из 3 пройдено` : "Начни с бесплатного теста";
  }
}
function onGraphCta() {
  const next = nextTestId();
  if (next) openPreviewSheet(next);
}
function renderGraphScreen() {
  if (hasShownTreeOnce) rebuildTreeInstant();
  else rebuildTreeAnimated();
  updateGraphStatus();
}

// ── Bottom sheet ─────────────────────────────────────────────────────────
function showSheet() { document.getElementById("sheet-overlay").classList.add("active"); }
function closeSheet(e) {
  if (e && e.target.id !== "sheet-overlay") return;
  document.getElementById("sheet-overlay").classList.remove("active");
}

function openPricingSheet() {
  const done = completedTests();
  const rows = TEST_SEQUENCE.map(id => {
    const meta = TEST_META[id];
    const isDone = done.includes(id);
    const isNext = id === nextTestId();
    const status = isDone ? "пройден ✓" : meta.price;
    return `
      <div class="tier-head-row" style="margin-bottom:10px;${isDone ? 'opacity:.55' : ''}">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="tier-icon-badge" style="width:40px;height:40px">${icon(meta.icon)}</div>
          <div>
            <div class="tier-name" style="font-size:14px">${meta.name}</div>
            <div class="tier-meta" style="margin-bottom:0">${meta.meta}</div>
          </div>
        </div>
        <span class="tier-price-tag">${status}</span>
      </div>
      ${isNext ? `<button class="btn btn-secondary" style="margin-bottom:14px" onclick="closeSheet(); openPreviewSheet('${id}');">${cta(done.length ? 'Продолжить' : 'Начать', meta.name, meta.icon)}</button>` : ""}
    `;
  }).join("");

  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-handle"></div>
    <div class="tier-name" style="font-size:18px;margin-bottom:4px">Тарифы</div>
    <div class="tier-meta" style="margin-bottom:16px">Пополняй баланс в Telegram. Стоимость теста списывается при старте.</div>
    ${rows}
  `;
  showSheet();
}

function openPreviewSheet(testId) {
  const meta = TEST_META[testId];
  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-handle"></div>
    <div class="tier-head-row" style="align-items:flex-start;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="tier-icon-badge">${icon(meta.icon)}</div>
        <div>
          <div class="tier-name">${meta.name}</div>
          <div class="tier-meta" style="margin-bottom:0">${meta.meta}</div>
        </div>
      </div>
      <span class="tier-price-tag">${meta.price}</span>
    </div>
    <div class="tier-feats" style="margin-bottom:18px">
      ${meta.feats.map(f => `<div class="tier-feat">${f}</div>`).join("")}
    </div>
    ${legalConsentBlock(testId)}
    <button class="btn btn-primary" id="start-test-btn" onclick="confirmStartTest('${testId}')" ${hasConsent() ? "" : "disabled"}>${testId === FREE_TEST_ID ? cta("Начать тест", "Бесплатно", meta.icon) : cta("Списать с баланса", meta.price, meta.icon)}</button>
  `;
  syncConsentCta(testId);
  showSheet();
}
async function confirmStartTest(testId) {
  if (!hasConsent()) {
    if (!document.getElementById("legal-consent-check")?.checked) {
      tg?.showAlert?.("Перед стартом нужно подтвердить согласие на обработку данных");
      syncConsentCta(testId);
      return;
    }
    saveConsent();
  }
  closeSheet();
  if (testId === FREE_TEST_ID) {
    selectedTest = testId;
    startTest();
    return;
  }
  await requestPurchase(testId);
}

async function requestPurchase(testId) {
  if (!tg) { alert("Открой этот тест через бота в Telegram, чтобы списать баланс"); return; }
  const price = TEST_PRICE_CENTS[testId] || 0;
  const btn = document.getElementById("start-test-btn");
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = cta("Списываем баланс", "Пару секунд", "wallet");
  }
  try {
    const res = await fetchWithTimeout(`${API_URL}/wallet/debit`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ tg_user_id: TG_USER_ID, test_id: testId, amount: price })
    }, 3500);
    if (!res.ok) throw new Error(`wallet debit failed: ${res.status}`);
    const data = await res.json();
    if (data.ok) {
      walletBalanceCents = data.balance;
      updateWalletBadge();
      selectedTest = testId;
      startTest();
      return;
    }
    requestTopupInChat(testId, price);
  } catch (e) {
    console.warn("wallet debit API failed, using session balance when possible", e);
    if (walletBalanceCents >= price) {
      walletBalanceCents -= price;
      updateWalletBadge();
      selectedTest = testId;
      startTest();
      return;
    }
    requestTopupInChat(testId, price);
  } finally {
    if (btn && document.getElementById("screen-test") && !document.getElementById("screen-test").classList.contains("active")) {
      btn.disabled = false;
      const meta = TEST_META[testId];
      btn.innerHTML = cta("Списать с баланса", meta.price, meta.icon);
    }
  }
}

function requestTopupInChat(testId, price) {
  try {
    tg.sendData(JSON.stringify({ action: "request_purchase", test_id: testId, price, consent: currentConsent() }));
    tg.close();
  } catch (sendErr) {
    console.error("sendData failed:", sendErr);
    tg.showAlert("Вернись в чат с ботом и нажми «Баланс», чтобы пополнить счет");
  }
}

function openResultSheet(testId, data) {
  const { top_types } = data;
  const topType = top_types[0];
  const rich = PROF_RICH[topType] || {};
  const limit = testId === "onett" ? 6 : testId === "yovayshi" ? 5 : 4;
  const profs = (rich.profs || []).slice(0, limit);

  let convergence = "";
  if (completedTests().length === TEST_SEQUENCE.length) {
    const tree = loadTree();
    const tops = TEST_SEQUENCE.map(id => Object.entries(tree[id].scores).sort((a, b) => b[1] - a[1])[0][0]);
    convergence = `<div class="tier-upgrade-box" style="border-style:solid">
      <div class="tier-upgrade-box-text"><b>Все три теста пройдены.</b> Это твой независимый профиль сразу по трём методикам — ${tops.join(" · ")}.</div>
    </div>`;
  }

  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-handle"></div>
    <div class="type-hero" style="margin-bottom:14px">
      <div class="type-hero-head">
        <div class="type-hero-icon">${icon(typeIconName(topType))}</div>
        <div>
          <div class="type-hero-name">${topType}</div>
          <div class="type-hero-desc">${rich.description || "Ведущий тип профессиональных интересов"}</div>
        </div>
      </div>
      ${rich.salary ? `<div class="type-hero-salary">${icon("money", "ui-icon-sm")} ${rich.salary}</div>` : ""}
      <div class="type-hero-profs-label">Подходящие профессии</div>
      <div class="type-hero-profs">${profs.map(p => `<span class="type-hero-tag">${p}</span>`).join("")}</div>
    </div>
    ${convergence}
    <button class="btn btn-primary" onclick="downloadPDF()">${cta("Получить PDF", "Придёт в Telegram", "fileText")}</button>
    <button class="btn btn-secondary btn-simple" style="margin-top:8px" onclick="closeSheet()">${simpleBtn("Смотреть карту", "map")}</button>
  `;
  showSheet();
}

// update last question button label
function updateNextLabel() {
  const btn = document.getElementById("btn-next");
  btn.innerHTML = currentQ === questions.length - 1
    ? cta("Получить результат", "Собрать профиль", "target")
    : cta("Далее", "", "", "arrowRight");
}
// patch nextQuestion to update label
const _origRender = renderQuestion;
window.renderQuestion = function() {
  _origRender();
  updateNextLabel();
};

// ── History (localStorage) ───────────────────────────────────────────────
const TEST_NAMES = { ddo: "Экспресс-тест (ДДО)", yovayshi: "Склонности (Йовайши)", onett: "Международный RIASEC (O*NET)", golomshtok: "Карта интересов" };

function saveToHistory(testId, scores, topTypes, recommendations) {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  history.unshift({
    date: new Date().toLocaleDateString("ru-RU"),
    test_id: testId,
    test_name: TEST_NAMES[testId] || testId,
    scores, top_types: topTypes, recommendations,
  });
  localStorage.setItem("poprobui_history", JSON.stringify(history.slice(0, 10)));
}

function showHistory() {
  document.getElementById("sheet-overlay").classList.remove("active");
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  const list = document.getElementById("history-list");
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">Тестов пока нет.<br>Пройди первый тест!</div>';
  } else {
    list.innerHTML = history.map((r, i) => `
      <div class="hist-card">
        <div class="hist-card-top">
          <div class="hist-test-name">${r.test_name}</div>
          <div class="hist-date">${r.date}</div>
        </div>
        <div class="hist-tops">
          ${(r.top_types || []).slice(0,3).map((t,j) =>
            `<span class="hist-top-tag${j===0?' first':''}">${j===0?'#1 ':j===1?'#2 ':'#3 '}${t}</span>`
          ).join("")}
        </div>
        <div class="hist-actions">
          <button class="hist-btn hist-btn-view" onclick="viewHistoryResult(${i})">${icon("target", "ui-icon-sm")}Смотреть</button>
          <button class="hist-btn hist-btn-pdf" onclick="pdfHistoryResult(${i})">${icon("fileText", "ui-icon-sm")}PDF</button>
        </div>
      </div>`).join("");
  }
  showScreen("screen-history");
}

function viewHistoryResult(i) {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  const r = history[i]; if (!r) return;
  resultScores = r.scores; resultTopTypes = r.top_types; resultRecommendations = r.recommendations || [];
  resultTestId = r.test_id || "ddo"; selectedTest = resultTestId;
  renderResults({ scores: r.scores, top_types: r.top_types, recommendations: r.recommendations });
  showScreen("screen-results");
}

function pdfHistoryResult(i) {
  const history = JSON.parse(localStorage.getItem("poprobui_history") || "[]");
  const r = history[i]; if (!r) return;
  resultScores = r.scores; resultTopTypes = r.top_types; resultRecommendations = r.recommendations || [];
  resultTestId = r.test_id || "ddo"; selectedTest = resultTestId;
  downloadPDF();
}

function initStaticCtas() {
  const pdfBtn = document.getElementById("btn-pdf");
  if (pdfBtn) pdfBtn.innerHTML = cta("Получить PDF", "Придёт в Telegram", "fileText");
  document.querySelectorAll(".btn-secondary.btn-simple").forEach(btn => {
    const text = btn.textContent.trim();
    if (text === "Смотреть карту") btn.innerHTML = simpleBtn("Смотреть карту", "map");
    if (text === "К тестам") btn.innerHTML = simpleBtn("К тестам", "arrowLeft");
  });
  document.querySelectorAll(".btn-ghost.btn-simple").forEach(btn => {
    if (btn.textContent.trim() === "Назад") btn.innerHTML = simpleBtn("Назад", "arrowLeft");
  });
}

// ── Enter key for questions ───────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const btn = document.getElementById("btn-next");
  if (btn && !btn.disabled && document.getElementById("screen-test").classList.contains("active")) {
    btn.click();
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────
initStaticCtas();
updateWalletBadge();
refreshWalletBalance();
initTreeCanvas();

// ── URL params on load (e.g. after payment: ?screen=test&tier=onett&paid=1) ──
(function() {
  const p = URL_PARAMS;
  // /reset swaps the PERSISTENT keyboard's URL to carry a reset param, so
  // every later reopen arrives with it too. Process each reset value only
  // once — otherwise reopening the app right after finishing a test wipes
  // the just-saved result (user-reported: "graph gone until I redo test").
  const resetParam = p.get("reset");
  if (resetParam && localStorage.getItem("poprobui_reset_seen") !== resetParam) {
    localStorage.setItem("poprobui_reset_seen", resetParam);
    resetLocalUserState();
  } else if (p.get("screen") === "results") {
    showHistory();
  } else if (p.get("screen") === "test") {
    const tier = p.get("tier");
    if (tier && TESTS[tier]) selectedTest = tier;
    startTest();
  } else {
    renderGraphScreen();
  }
})();
treeLoop();
